server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # React Router — all non-asset paths → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Forward API calls to project-service (proxied via docker network)
    location /api/v1/auth/ {
        proxy_pass http://auth-service:3001/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ai-service routes
    location /api/v1/ai/ {
        proxy_pass http://ai-service:8004/api/v1/ai/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ingestion-service routes — regex locations take priority over prefix /api/v1/
    location ~ ^/api/v1/projects/[^/]+/stubs/upload$ {
        client_max_body_size 50m;
        proxy_pass http://ingestion-service:8003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location ~ ^/api/v1/projects/[^/]+/stubs/[^/]+/source$ {
        proxy_pass http://ingestion-service:8003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/ {
        proxy_pass http://project-service:8001/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # WebSocket proxy for live metrics
    location /ws/ {
        proxy_pass http://metrics-service:8005/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1000;
}
