stages:
  - build-image
  - test
  - verify-scanning-results

# Pull in NatWest standard scanning templates (same pattern as sample .gitlab-ci.yml)
include:
  - project: natwestgroup/EngineeringArtifacts/EngineeringComponents/Templates/continuous-integration
    ref: 5.0.2
    file:
      - Container-Scanning.gitlab-ci.yml
      - Secret-Detection.gitlab-ci.yml

variables:
  # Vault configuration (same Vault as sample — Mockingbird uses its own role/path)
  VAULT_SERVER_URL: https://vault-dev-pnf.web.deviaas.intenv01.net
  VAULT_NAMESPACE: secrets
  MOUNT_PATH: kv
  VAULT_AUTH_ROLE: mockingbird                        # Mockingbird-specific Vault role (to be created)
  VAULT_AUTH_PATH: jwt/gitlab
  SECRET_PATH: mockingbird/ci/docker                  # Mockingbird Docker auth stored here in Vault

  # Kaniko (confirmed image from sample)
  KANIKO_IMAGE_PATH: registry.natwest.gitlab-dedicated.com/natwestgroup/engineeringartifacts/engineeringcomponents/executors/build/kaniko/multi-arch/v1.24:v1.24.0-debug

  # Artifactory (confirmed URL from settings_linux.xml)
  # ARTIFACTORY_USR and ARTIFACTORY_PSWD are pulled from Vault at build time
  ARTIFACTORY_URL: https://artifactory-server.app.banksvcs.net/artifactory/dws-all-repos

  IMAGE_REGISTRY: $CI_REGISTRY_IMAGE
  SNAPSHOT_IMAGE_TAG: "${IMAGE_REGISTRY}:${CI_PIPELINE_ID}-SNAPSHOT"
  RUNNER_TAG: nwg-rosa-sharedrunner-scan

# Fetch Docker auth config from Vault using GitLab JWT OIDC
.get-vault-secrets:
  id_tokens:
    VAULT_ID_TOKEN:
      aud: $VAULT_SERVER_URL
  secrets:
    DOCKER_AUTH_CONFIG:
      vault: $SECRET_PATH/DOCKER_AUTH_CONFIG@$MOUNT_PATH
      token: $VAULT_ID_TOKEN
      file: false
    ARTIFACTORY_USR:
      vault: mockingbird/ci/artifactory/USERNAME@$MOUNT_PATH
      token: $VAULT_ID_TOKEN
      file: false
    ARTIFACTORY_PSWD:
      vault: mockingbird/ci/artifactory/PASSWORD@$MOUNT_PATH
      token: $VAULT_ID_TOKEN
      file: false

build_stub_image:
  stage: build-image
  tags:
    - $RUNNER_TAG
  image:
    name: $KANIKO_IMAGE_PATH
    entrypoint: [""]
  extends: .get-vault-secrets
  script:
    - |
      # Determine image tag based on branch
      if [[ "$CI_COMMIT_BRANCH" == "main" || "$CI_COMMIT_BRANCH" == "$CI_DEFAULT_BRANCH" ]]; then
        publish_destinations="--destination ${IMAGE_REGISTRY}:latest --destination ${IMAGE_REGISTRY}:${CI_COMMIT_SHORT_SHA}"
        echo "CS_IMAGE_PATH=${IMAGE_REGISTRY}:latest" > dotenv.env
      else
        publish_destinations="--destination ${SNAPSHOT_IMAGE_TAG}"
        echo "CS_IMAGE_PATH=${SNAPSHOT_IMAGE_TAG}" > dotenv.env
      fi
      echo "Publishing to: $publish_destinations"
    - /kaniko/executor
        ${publish_destinations}
        --context "${CI_PROJECT_DIR}"
        --dockerfile "${CI_PROJECT_DIR}/Dockerfile"
        --compressed-caching=false
        --use-new-run
        --cleanup
        --cache=true
        --build-arg ARTIFACTORY_USR="${ARTIFACTORY_USR}"
        --build-arg ARTIFACTORY_PSWD="${ARTIFACTORY_PSWD}"
        --digest-file=push-metadata.txt
  artifacts:
    reports:
      dotenv: dotenv.env
    paths:
      - push-metadata.txt
