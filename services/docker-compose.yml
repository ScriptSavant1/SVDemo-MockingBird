# Local development stack — NOT for production.
#
# BEFORE RUNNING:
#   cp config/example.env config/local.env
#   Edit config/local.env with your real values.
#
# START:
#   cd services
#   docker compose --env-file ../config/local.env up -d
#
# MIGRATIONS (first time only):
#   docker compose --env-file ../config/local.env run --rm project-service alembic upgrade head
#
# All ${VARIABLE} placeholders are resolved from config/local.env.
# Fallback values after :- are safe for local dev only — not for production.

version: "3.9"

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: mockingbird-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mockingbird
      POSTGRES_USER: mockingbird
      POSTGRES_PASSWORD: ${DB_PASSWORD:-local-dev-change-this}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mockingbird -d mockingbird"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: mockingbird-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── auth-service (Node.js 20 + Fastify) ─────────────────────────────────────
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
      args:
        # Reads ARTIFACTORY_NPM_URL from config/local.env → passed to npm config
        NPM_REGISTRY: ${ARTIFACTORY_NPM_URL:-https://registry.npmjs.org}
    container_name: mockingbird-auth-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: "3001"
      HOST: "0.0.0.0"
      JWT_SECRET: ${JWT_SECRET:-local-dev-change-this}
      DATABASE_URL: ${DATABASE_URL:-postgresql://mockingbird:local-dev-change-this@postgres:5432/mockingbird}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      LDAP_SERVER: ${LDAP_SERVER:-}
      LDAP_BASE_DN: ${LDAP_BASE_DN:-}
      LDAP_BIND_DN: ${LDAP_BIND_DN:-}
      LDAP_BIND_PASSWORD: ${LDAP_BIND_PASSWORD:-}
      LDAP_SV_TEAM_GROUP: ${LDAP_SV_TEAM_GROUP:-CN=SV-Team}
      LDAP_SV_USERS_GROUP: ${LDAP_SV_USERS_GROUP:-CN=SV-Users}
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # ── project-service (Python 3.11 + FastAPI) ──────────────────────────────────
  project-service:
    build:
      context: ./project-service
      dockerfile: Dockerfile
      args:
        # Reads ARTIFACTORY_PYPI_URL from config/local.env → passed to pip
        PIP_INDEX_URL: ${ARTIFACTORY_PYPI_URL:-https://pypi.org/simple}
    container_name: mockingbird-project-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://mockingbird:local-dev-change-this@postgres:5432/mockingbird}
      JWT_SECRET: ${JWT_SECRET:-local-dev-change-this}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      SERVICE_NAME: "project-service"
      ENVIRONMENT: ${ENVIRONMENT:-local}
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\" || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  # ── ingestion-service (Python 3.11 + FastAPI) ───────────────────────────────
  ingestion-service:
    build:
      context: ./ingestion-service
      dockerfile: Dockerfile
      args:
        PIP_INDEX_URL: ${ARTIFACTORY_PYPI_URL:-https://pypi.org/simple}
    container_name: mockingbird-ingestion-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://mockingbird:local-dev-change-this@postgres:5432/mockingbird}
      JWT_SECRET: ${JWT_SECRET:-local-dev-change-this}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      S3_BUCKET: ${S3_BUCKET:-mockingbird-stubs}
      AWS_REGION: ${AWS_REGION:-eu-west-2}
      SERVICE_NAME: "ingestion-service"
      ENVIRONMENT: ${ENVIRONMENT:-local}
    ports:
      - "8003:8003"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8003/health')\" || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  # ── parser-worker (Python 3.11 — SQS consumer) ─────────────────────────────
  parser-worker:
    build:
      context: ./parser-worker
      dockerfile: Dockerfile
      args:
        PIP_INDEX_URL: ${ARTIFACTORY_PYPI_URL:-https://pypi.org/simple}
    container_name: mockingbird-parser-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://mockingbird:local-dev-change-this@postgres:5432/mockingbird}
      SQS_PARSE_QUEUE_URL: ${SQS_PARSE_QUEUE_URL:-}
      SQS_GENERATE_QUEUE_URL: ${SQS_GENERATE_QUEUE_URL:-}
      S3_BUCKET: ${S3_BUCKET:-mockingbird-stubs}
      AWS_REGION: ${AWS_REGION:-eu-west-2}
      ENVIRONMENT: ${ENVIRONMENT:-local}
    command: ["sv-parse-worker"]

  # ── generator-worker (Python 3.11 — SQS consumer) ──────────────────────────
  generator-worker:
    build:
      context: .
      dockerfile: generator-worker/Dockerfile
      args:
        PIP_INDEX_URL: ${ARTIFACTORY_PYPI_URL:-https://pypi.org/simple}
    container_name: mockingbird-generator-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://mockingbird:local-dev-change-this@postgres:5432/mockingbird}
      SQS_GENERATE_QUEUE_URL: ${SQS_GENERATE_QUEUE_URL:-}
      S3_BUCKET: ${S3_BUCKET:-mockingbird-stubs}
      AWS_REGION: ${AWS_REGION:-eu-west-2}
      ENVIRONMENT: ${ENVIRONMENT:-local}
    command: ["sv-generate-worker"]

  # ── metrics-service (Python 3.11 FastAPI — Prometheus scraper + Timestream + WebSocket) ──
  metrics-service:
    build:
      context: ./metrics-service
      dockerfile: Dockerfile
      args:
        PIP_INDEX_URL: ${ARTIFACTORY_PYPI_URL:-https://pypi.org/simple}
    container_name: mockingbird-metrics-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://mockingbird:local-dev-change-this@postgres:5432/mockingbird}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      AWS_REGION: ${AWS_REGION:-eu-west-2}
      TIMESTREAM_DATABASE: ${TIMESTREAM_DATABASE:-mockingbird}
      TIMESTREAM_TABLE: ${TIMESTREAM_TABLE:-stub_metrics}
      SCRAPE_INTERVAL_SECONDS: ${SCRAPE_INTERVAL_SECONDS:-30}
      ENVIRONMENT: ${ENVIRONMENT:-local}
    ports:
      - "8005:8005"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8005/health')\" || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  # ── reporter-worker (Python 3.11 — SQS REPORT consumer, PDF+Excel+PPT) ────
  reporter-worker:
    build:
      context: ./reporter-service
      dockerfile: Dockerfile
      args:
        PIP_INDEX_URL: ${ARTIFACTORY_PYPI_URL:-https://pypi.org/simple}
    container_name: mockingbird-reporter-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://mockingbird:local-dev-change-this@postgres:5432/mockingbird}
      SQS_REPORT_QUEUE_URL: ${SQS_REPORT_QUEUE_URL:-}
      S3_BUCKET: ${S3_BUCKET:-mockingbird-stubs}
      AWS_REGION: ${AWS_REGION:-eu-west-2}
      TIMESTREAM_DATABASE: ${TIMESTREAM_DATABASE:-mockingbird}
      TIMESTREAM_TABLE: ${TIMESTREAM_TABLE:-stub_metrics}
      BRAND_PRIMARY_COLOUR: ${BRAND_PRIMARY_COLOUR:-#003875}
      BRAND_SECONDARY_COLOUR: ${BRAND_SECONDARY_COLOUR:-#00A9E0}
      BRAND_COMPANY_NAME: ${BRAND_COMPANY_NAME:-Your Organisation}
      ENVIRONMENT: ${ENVIRONMENT:-local}
    command: ["sv-report-worker"]

  # ── portal (React 18 + Vite — Nginx static server + reverse proxy) ─────────
  portal:
    build:
      context: ../portal
      dockerfile: Dockerfile
      args:
        NPM_REGISTRY: ${ARTIFACTORY_NPM_URL:-https://registry.npmjs.org}
    container_name: mockingbird-portal
    restart: unless-stopped
    depends_on:
      auth-service:
        condition: service_healthy
      project-service:
        condition: service_healthy
    ports:
      - "3000:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  # ── ai-service (Python 3.11 + FastAPI — Claude API stub generation) ─────────
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
      args:
        PIP_INDEX_URL: ${ARTIFACTORY_PYPI_URL:-https://pypi.org/simple}
    container_name: mockingbird-ai-service
    restart: unless-stopped
    depends_on:
      auth-service:
        condition: service_healthy
    environment:
      DATABASE_URL: ${AI_SERVICE_DATABASE_URL:-sqlite:///./mockingbird_ai.db}
      JWT_SECRET: ${JWT_SECRET:-local-dev-change-this}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GENERATION_MODEL: ${AI_GENERATION_MODEL:-claude-sonnet-4-6}
      CLASSIFICATION_MODEL: ${AI_CLASSIFICATION_MODEL:-claude-haiku-4-5-20251001}
      MAX_TOKENS: ${AI_MAX_TOKENS:-8192}
      RATE_LIMIT_PER_HOUR: ${AI_RATE_LIMIT_PER_HOUR:-10}
      SERVICE_NAME: "ai-service"
      ENVIRONMENT: ${ENVIRONMENT:-local}
    ports:
      - "8004:8004"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8004/health')\" || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  # ── deployer-worker (Python 3.11 — SQS consumer, Terraform + GitLab CI) ────
  deployer-worker:
    build:
      context: ..
      dockerfile: services/deployer-worker/Dockerfile
      args:
        PIP_INDEX_URL: ${ARTIFACTORY_PYPI_URL:-https://pypi.org/simple}
        TERRAFORM_VERSION: "1.8.5"
    container_name: mockingbird-deployer-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://mockingbird:local-dev-change-this@postgres:5432/mockingbird}
      SQS_DEPLOY_QUEUE_URL: ${SQS_DEPLOY_QUEUE_URL:-}
      S3_BUCKET: ${S3_BUCKET:-mockingbird-stubs}
      TERRAFORM_STATE_BUCKET: ${TERRAFORM_STATE_BUCKET:-mockingbird-terraform-state}
      TERRAFORM_LOCKS_TABLE: ${TERRAFORM_LOCKS_TABLE:-mockingbird-terraform-locks}
      AWS_REGION: ${AWS_REGION:-eu-west-2}
      GITLAB_URL: ${GITLAB_URL:-https://gitlab.internal}
      GITLAB_TOKEN: ${GITLAB_TOKEN:-}
      GITLAB_STUB_BUILDER_PROJECT_ID: ${GITLAB_STUB_BUILDER_PROJECT_ID:-}
      GITLAB_REGISTRY: ${GITLAB_REGISTRY:-}
      EC2_SUBNET_ID: ${EC2_SUBNET_ID:-}
      EC2_SECURITY_GROUP_ID: ${EC2_SECURITY_GROUP_ID:-}
      EC2_KEY_PAIR_NAME: ${EC2_KEY_PAIR_NAME:-mockingbird-key}
      EC2_IAM_INSTANCE_PROFILE: ${EC2_IAM_INSTANCE_PROFILE:-MockingbirdStubInstanceProfile}
      JAVA_BASE_IMAGE: ${JAVA_BASE_IMAGE:-eclipse-temurin:21-jre-alpine}
      ENVIRONMENT: ${ENVIRONMENT:-local}
    command: ["sv-deploy-worker"]

volumes:
  postgres_data:
    name: mockingbird_postgres_data
