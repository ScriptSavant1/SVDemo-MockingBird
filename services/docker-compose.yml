# Local development stack — NOT for production.
#
# BEFORE RUNNING:
#   cp config/example.env config/local.env
#   Edit config/local.env with your real values.
#
# START:
#   cd services
#   docker compose --env-file ../config/local.env up -d
#
# MIGRATIONS (first time only):
#   docker compose --env-file ../config/local.env run --rm project-service alembic upgrade head
#
# All ${VARIABLE} placeholders are resolved from config/local.env.
# Fallback values after :- are safe for local dev only — not for production.

version: "3.9"

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: mockingbird-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mockingbird
      POSTGRES_USER: mockingbird
      POSTGRES_PASSWORD: ${DB_PASSWORD:-local-dev-change-this}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mockingbird -d mockingbird"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: mockingbird-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── auth-service (Node.js 20 + Fastify) ─────────────────────────────────────
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
      args:
        # Reads ARTIFACTORY_NPM_URL from config/local.env → passed to npm config
        NPM_REGISTRY: ${ARTIFACTORY_NPM_URL:-https://registry.npmjs.org}
    container_name: mockingbird-auth-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: "3001"
      HOST: "0.0.0.0"
      JWT_SECRET: ${JWT_SECRET:-local-dev-change-this}
      DATABASE_URL: ${DATABASE_URL:-postgresql://mockingbird:local-dev-change-this@postgres:5432/mockingbird}
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # ── project-service (Python 3.11 + FastAPI) ──────────────────────────────────
  project-service:
    build:
      context: ./project-service
      dockerfile: Dockerfile
      args:
        # Reads ARTIFACTORY_PYPI_URL from config/local.env → passed to pip
        PIP_INDEX_URL: ${ARTIFACTORY_PYPI_URL:-https://pypi.org/simple}
    container_name: mockingbird-project-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://mockingbird:local-dev-change-this@postgres:5432/mockingbird}
      JWT_SECRET: ${JWT_SECRET:-local-dev-change-this}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      SERVICE_NAME: "project-service"
      ENVIRONMENT: ${ENVIRONMENT:-local}
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\" || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  # ── ingestion-service (Python 3.11 + FastAPI) ───────────────────────────────
  ingestion-service:
    build:
      context: ./ingestion-service
      dockerfile: Dockerfile
      args:
        PIP_INDEX_URL: ${ARTIFACTORY_PYPI_URL:-https://pypi.org/simple}
    container_name: mockingbird-ingestion-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://mockingbird:local-dev-change-this@postgres:5432/mockingbird}
      JWT_SECRET: ${JWT_SECRET:-local-dev-change-this}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      S3_BUCKET: ${S3_BUCKET:-mockingbird-stubs}
      AWS_REGION: ${AWS_REGION:-eu-west-2}
      SERVICE_NAME: "ingestion-service"
      ENVIRONMENT: ${ENVIRONMENT:-local}
    ports:
      - "8003:8003"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8003/health')\" || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  # ── parser-worker (Python 3.11 — SQS consumer) ─────────────────────────────
  parser-worker:
    build:
      context: ./parser-worker
      dockerfile: Dockerfile
      args:
        PIP_INDEX_URL: ${ARTIFACTORY_PYPI_URL:-https://pypi.org/simple}
    container_name: mockingbird-parser-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://mockingbird:local-dev-change-this@postgres:5432/mockingbird}
      SQS_PARSE_QUEUE_URL: ${SQS_PARSE_QUEUE_URL:-}
      SQS_GENERATE_QUEUE_URL: ${SQS_GENERATE_QUEUE_URL:-}
      S3_BUCKET: ${S3_BUCKET:-mockingbird-stubs}
      AWS_REGION: ${AWS_REGION:-eu-west-2}
      ENVIRONMENT: ${ENVIRONMENT:-local}
    command: ["sv-parse-worker"]

  # ── generator-worker (Python 3.11 — SQS consumer) ──────────────────────────
  generator-worker:
    build:
      context: .
      dockerfile: generator-worker/Dockerfile
      args:
        PIP_INDEX_URL: ${ARTIFACTORY_PYPI_URL:-https://pypi.org/simple}
    container_name: mockingbird-generator-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://mockingbird:local-dev-change-this@postgres:5432/mockingbird}
      SQS_GENERATE_QUEUE_URL: ${SQS_GENERATE_QUEUE_URL:-}
      S3_BUCKET: ${S3_BUCKET:-mockingbird-stubs}
      AWS_REGION: ${AWS_REGION:-eu-west-2}
      ENVIRONMENT: ${ENVIRONMENT:-local}
    command: ["sv-generate-worker"]

volumes:
  postgres_data:
    name: mockingbird_postgres_data
